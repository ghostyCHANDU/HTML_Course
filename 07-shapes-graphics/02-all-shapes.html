<script>
window.addEventListener('load', function() {
    const img = document.querySelector('img[usemap]');
    if (!img) return;

    const wrapper = document.createElement('div');
    wrapper.style.position = 'relative';
    wrapper.style.display = 'inline-block';
    
    img.parentNode.insertBefore(wrapper, img);
    wrapper.appendChild(img); // Move img into wrapper

    const mapName = img.getAttribute('usemap').substring(1);
    const map = document.querySelector(`map[name="${mapName}"]`);
    if (!map) return;
    
    const areas = map.querySelectorAll('area');

    areas.forEach(area => {
        const coords = area.coords.split(',').map(Number);
        const shape = area.getAttribute('shape');
        
        const highlight = document.createElement('div');
        highlight.className = 'highlight';

        if (shape === 'rect') {
            const [x1, y1, x2, y2] = coords;
            highlight.style.left = x1 + 'px';
            highlight.style.top = y1 + 'px';
            highlight.style.width = (x2 - x1) + 'px';
            highlight.style.height = (y2 - y1) + 'px';
        } else if (shape === 'circle') {
            const [x, y, r] = coords;
            highlight.style.left = (x - r) + 'px';
            highlight.style.top = (y - r) + 'px';
            highlight.style.width = (r * 2) + 'px';
            highlight.style.height = (r * 2) + 'px';
            highlight.style.borderRadius = '50%';
        } else if (shape === 'poly') {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const points = [];
            for (let i = 0; i < coords.length; i += 2) {
                const x = coords[i];
                const y = coords[i + 1];
                points.push({x, y});
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x);
                maxY = Math.max(maxY, y);
            }
            highlight.style.left = minX + 'px';
            highlight.style.top = minY + 'px';
            highlight.style.width = (maxX - minX) + 'px';
            highlight.style.height = (maxY - minY) + 'px';
            
            const clipPathPoints = points.map(p => `${p.x - minX}px ${p.y - minY}px`).join(',');
            highlight.style.clipPath = `polygon(${clipPathPoints})`;
            highlight.style.backgroundColor = 'rgba(144, 238, 144, 0.5)';
            highlight.style.border = 'none';
        }
        
        wrapper.appendChild(highlight);
    });
});
</script>

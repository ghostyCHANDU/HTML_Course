<!DOCTYPE html>
<html>
    <head>
        <title>
            Use map 
        </title>
    </head>
    <body>
<h1> This is Image Maping </h1>
<img src="maxresdefault.jpg" alt="Workplace" usemap="#workmap" width="1200" height="720">

<map name="workmap">
  <area shape="circle" coords="280,360,165" alt="circle" href="#">
  <area shape="Triangle" coords="330,360,265" alt="Triangle" href="#">
  <area shape="rect" coords="337,300,44" alt="rect" href="#">
</map>
    </body>
</html>
